<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雇主註冊/登入 - 昕力資訊</title>
    <style>
        /* 延用首頁的色彩與字體規範 */
        :root {
            --primary-orange: #f97316;
            --secondary-blue: #3b82f6;
            --bg-light-blue: #f0f8ff;
            --text-dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--bg-light-blue);
            color: var(--text-dark);
        }

        /* 左上角標題區塊（延用） */
        header {
            padding: 24px 32px;
            position: absolute;
            top: 0;
            left: 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 1rem;
            color: #4b5563;
        }

        /* 中央登入/註冊區塊 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: 100px;
        }

        .auth-container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-header h2 {
            margin: 0 0 12px 0;
            font-size: 1.75rem;
            font-weight: bold;
            color: var(--secondary-blue); /* 雇主身份別使用藍色強調 */
        }

        .auth-header p {
            margin: 0 0 32px 0;
            color: #4b5563;
            font-size: 1rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4b5563;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box; /* 確保 padding 不會把寬度撐爆 */
        }

        .input-group input:focus {
            border-color: var(--secondary-blue);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* 發送 OTP 按鈕 */
        .otp-btn {
            background-color: var(--secondary-blue); /* 雇主身份別使用藍色按鈕 */
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            transition: background-color 0.2s;
        }

        .otp-btn:hover {
            background-color: #2563eb; /* 深一點的藍色 */
        }

        /* 底部連結 */
        .footer-links {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .footer-links a {
            color: var(--secondary-blue);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>移工看護媒合平台</h1>
        <p>昕力資訊</p>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h2>雇主註冊 / 登入</h2>
                <p>請輸入通訊資料以開始驗證</p>
            </div>

            <div class="input-group">
                <label for="contact-input">手機號碼 或 Email</label>
                <input type="text" id="contact-input" placeholder="0912345678 或 employer@email.com">
            </div>

            <button class="otp-btn" id="btn-otp">發送驗證碼 (OTP)</button>

            <div class="footer-links">
                <p><a href="#">我需要 Google 登入</a></p>
                <p><a href="index.html">← 返回更換身份</a></p>
            </div>
        </div>
    </main>

    <script>
        const btnOtp = document.getElementById('btn-otp');
        const contactInput = document.getElementById('contact-input');

        btnOtp.addEventListener('click', () => {
            localStorage.setItem('mcp_role','employer');
            const inputValue = contactInput.value.trim();
            
            // 基礎防呆：檢查是否輸入了東西
            if (!inputValue) {
                alert('請輸入手機號碼或 Email！');
                return;
            }

            // 技術文件中 Sprint 1 的重點：Email 與手機 OTP (假的 OTP 模擬)
            console.log("準備為以下資料發送 OTP：", inputValue);
            alert(`【技術展示】\n驗證碼 (OTP) 已模擬發送至：\n${inputValue}\n\n請輸入模擬驗證碼：1234`);
            
            // [修改重點]：下一步引導至 OTP 輸入頁面
            window.location.href = 'verify-otp.html';
        });
    </script>

</body>
</html>
